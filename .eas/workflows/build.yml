name: Build Android and iOS apps

on:
  push:
    branches: ['master']

jobs:
  build_android:
    name: Build Android APK
    runs-on: linux-medium-default
    steps:
      - uses: eas/checkout
      - name: Install pnpm 10 and dependencies
        run: |
          npm install -g pnpm@10.28.0
          pnpm install --no-frozen-lockfile --ignore-scripts
      - uses: eas/build
        with:
          platform: android
          profile: preview
          working_directory: artifacts/lms-mobile

  build_ios:
    name: Build iOS app
    runs-on: macos-medium-default
    steps:
      - uses: eas/checkout
      - name: Install pnpm 10 and dependencies
        run: |
          npm install -g pnpm@10.28.0
          pnpm install --no-frozen-lockfile --ignore-scripts
      - uses: eas/build
        with:
          platform: ios
          profile: preview
          working_directory: artifacts/lms-mobile
