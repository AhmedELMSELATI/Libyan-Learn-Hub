kind = "mobile"
previewPath = "/lms-mobile/"
title = "Libyan E-Learning Mobile"
version = "1.0.0"
id = "artifacts/lms-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/lms-mobile/" ]
localPort = 21752

[services.development]
run = "pnpm --filter @workspace/lms-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lms-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lms-mobile", "run", "serve" ]

[services.env]
PORT = "21752"
BASE_PATH = "/lms-mobile/"
