name: Android Build & Cloud Update (Like Replit)

on:
  push:
    branches:
      - master

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Trigger Android EAS build
        run: |
          cd artifacts/lms-mobile
          eas build --platform android --profile preview --non-interactive --no-wait

  publish_update:
    name: Publish Expo Cloud Update
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Trigger Expo Cloud Update
        run: |
          cd artifacts/lms-mobile
          eas update --branch preview --message "GitHub Update: ${{ github.sha }}" --non-interactive
