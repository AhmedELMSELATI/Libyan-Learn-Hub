name: EAS Update (Expo Go)

on:
  push:
    branches:
      - master

jobs:
  publish_update:
    name: Publish Update to Expo Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.28.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Expo Update
        run: |
          cd artifacts/lms-mobile
          npx eas-cli update --branch preview --message "GitHub Update: ${{ github.sha }}" --non-interactive
