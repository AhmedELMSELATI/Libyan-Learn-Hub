name: EAS Build (Android & iOS)

on:
  push:
    branches:
      - master

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.28.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Android EAS build
        run: |
          cd artifacts/lms-mobile
          npx eas-cli build --platform android --profile preview --non-interactive --clear-cache --no-wait

  build_ios:
    name: Build iOS Simulator
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.28.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger iOS Simulator EAS build
        run: |
          cd artifacts/lms-mobile
          EXPO_IOS_SIMULATOR=1 IPHONE_OS_SIMULATOR=1 npx eas-cli build --platform ios --profile preview --non-interactive --clear-cache --no-wait
